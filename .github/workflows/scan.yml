name: Bounty Scanner
on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: node scanner.js
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
